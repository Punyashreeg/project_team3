<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Online Bookstore - Cart</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background-color: #f9f9f9;
    }
    h1 {
      text-align: center;
    }
    .book {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    img {
      width: 100px;
      height: 130px;
    }
    button {
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h1>📚 Online Bookstore - Cart</h1>
<!-- Book List Starts -->
<div id="catalog">

  <div class="book">
    <img src="book1.jpeg" alt="Book 1">
    <h3>The Alchemist</h3>
    <p>Price: ₹350</p>
    <button onclick="addToCart('The Alchemist', 350)">Add to Cart</button>
  </div>
<div class="book">
    <img src="book2.jpeg" alt="Book 2">
    <h3>Rich Dad Poor Dad</h3>
    <p>Price: ₹299</p>
    <button onclick="addToCart('Rich Dad Poor Dad', 299)">Add to Cart</button>
  </div>

  <div class="book">
    <img src="book3.jpeg" alt="Book 3">
    <h3>Wings of Fire</h3>
    <p>Price: ₹199</p>
    <button onclick="addToCart('Wings of Fire', 199)">Add to Cart</button>
  </div>
